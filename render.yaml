# Render Blueprint: Express API + Vite UI (single web service) + PostgreSQL
# Deploy: push this file, then open:
#   https://dashboard.render.com/blueprint/new?repo=<your-repo-https-url>
#
# Free tier: web service may sleep after ~15 min idle; first request wakes it (cold start).

databases:
  - name: municipal-pms-db
    databaseName: municipal_pms
    user: municipal_pms
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: municipal-pms
    runtime: node
    plan: free
    region: oregon
    branch: main
    # Git push to main should deploy. If webhooks fail, use GitHub Actions + RENDER_DEPLOY_HOOK_URL (see .github/workflows/ci-cd.yml).
    autoDeploy: true
    # Vite lives in devDependencies; Render omits them unless --include=dev
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run db:seed:prod && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: municipal-pms-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: municipal-pms

name: municipal-pms

services:
  db:
    image: postgres:16-alpine
    container_name: municipal-pms-db
    environment:
      POSTGRES_DB: demo_docker_learning
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_secret_2026
    ports:
      - "5433:5432"
    volumes:
      - demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d demo_docker_learning"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:20-bookworm
    container_name: municipal-pms-app
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    ports:
      - "3001:3001"
      - "5173:5173"
    volumes:
      - ./:/app
      - demo_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://demo_user:demo_secret_2026@db:5432/demo_docker_learning?schema=public
      AUTH_SECRET: municipal-pms-dev-secret-change-in-production-min-32chars
      NEXTAUTH_SECRET: municipal-pms-dev-secret-change-in-production-min-32chars
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  demo_pgdata:
  demo_node_modules:
